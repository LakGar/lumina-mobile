<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Editor</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        -webkit-text-size-adjust: 100%;
        background: #fff;
      }
      #root {
        height: 100%;
        min-height: 260px;
      }
      .editor-shell {
        height: 100%;
        padding: 12px 16px;
        font-size: 17px;
        line-height: 1.45;
      }
      .editor-placeholder {
        color: #999;
        position: absolute;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
